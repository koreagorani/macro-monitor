name: Manual Weekly Report Notion Save

on:
  workflow_dispatch:
    inputs:
      as_of:
        description: Report date in YYYY-MM-DD format. Leave blank for UTC today.
        required: false
        type: string

permissions:
  contents: read

jobs:
  save-weekly-report-notion:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Run tests
        run: npm test

      - name: Validate synthetic examples
        run: npm run validate:examples

      - name: Save weekly report to Notion
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATA_SOURCE_ID: ${{ secrets.NOTION_DATA_SOURCE_ID }}
          NOTION_API_VERSION: ${{ vars.NOTION_API_VERSION }}
          AS_OF: ${{ inputs.as_of }}
        run: |
          if [ -n "$AS_OF" ]; then
            npm run save:weekly-report:notion -- "$AS_OF"
          else
            npm run save:weekly-report:notion
          fi
