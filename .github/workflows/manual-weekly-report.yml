name: Manual Weekly Report Generation

on:
  workflow_dispatch:
    inputs:
      as_of:
        description: Report date in YYYY-MM-DD format. Leave blank for UTC today.
        required: false
        type: string

permissions:
  contents: read

jobs:
  generate-weekly-report:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Run tests
        run: npm test

      - name: Validate synthetic examples
        run: npm run validate:examples

      - name: Generate weekly report
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
          AS_OF: ${{ inputs.as_of }}
        run: |
          if [ -n "$AS_OF" ]; then
            npm run generate:weekly-report -- "$AS_OF"
          else
            npm run generate:weekly-report
          fi
